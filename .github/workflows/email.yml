name: Fraud Alert Email

on:
  repository_dispatch:
    types: [fraud_alert]

jobs:
  send_email:
    runs-on: ubuntu-latest
    steps:
      - name: Send fraud alert email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 HIGH ALERT — Fraud Detected"
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: Fraud Detection System
          body: |
            HIGH RISK FRAUD ALERT
            ─────────────────────────────
            Transaction ID : ${{ github.event.client_payload.transaction_id }}
            Risk Score     : ${{ github.event.client_payload.risk_score }}
            Amount         : ${{ github.event.client_payload.amount }}
            Type           : ${{ github.event.client_payload.type }}
            ─────────────────────────────
            Please review this transaction immediately in the dashboard.
